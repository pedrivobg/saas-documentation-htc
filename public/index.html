<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Documentação completa da plataforma de CRM e automação.">
  <title>[App da Agência] — Documentação</title>
  <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./assets/css/components.css">
  <script src="./config.js"></script>
</head>
<body>

  <!-- HEADER -->
  <header class="doc-header">
    <button class="sidebar-toggle" aria-label="Menu">
      <i data-lucide="menu" style="width:20px;height:20px"></i>
    </button>
    <a href="./" class="header-app-name" id="header-app-name"></a>
    <div class="header-search">
      <button class="search-trigger" aria-label="Buscar">
        <i data-lucide="search" style="width:16px;height:16px"></i>
        <span>Buscar na documentação...</span>
        <kbd>/</kbd>
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside class="doc-sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="" id="sidebar-logo" alt="" height="36">
    </div>
    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- generated by app.js -->
    </nav>
  </aside>

  <!-- OVERLAY MOBILE -->
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <!-- MAIN LAYOUT -->
  <main class="doc-main">
    <div class="doc-content-wrapper">
      <div class="doc-content" id="doc-content">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
      <aside class="doc-toc" id="doc-toc">
        <div class="toc-inner">
          <p class="toc-title">Nesta página</p>
          <ul class="toc-list" id="toc-list"></ul>
        </div>
      </aside>
    </div>
  </main>

  <!-- SEARCH MODAL -->
  <div class="search-modal" id="search-modal" hidden>
    <div class="search-backdrop"></div>
    <div class="search-container">
      <div class="search-input-wrapper">
        <i data-lucide="search" style="width:18px;height:18px"></i>
        <input type="text" id="search-input" placeholder="Buscar na documentação..." autocomplete="off">
        <kbd>ESC</kbd>
      </div>
      <ul class="search-results" id="search-results"></ul>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="./assets/js/search-index.js"></script>
  <script src="./assets/js/app.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
